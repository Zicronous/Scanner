<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Scanner - Raw Materials</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <!-- SQL.js for database - CORRECT VERSION -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.wasm"></script>
<script>
    // Make sure initSqlJs is available globally
    window.initSqlJs = window.initSqlJs || function(config) {
        return new Promise(function(resolve, reject) {
            if (window.SQL) {
                resolve(window.SQL);
            } else {
                // Fallback - load from CDN
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js';
                script.onload = () => resolve(window.SQL);
                script.onerror = reject;
                document.head.appendChild(script);
            }
        });
    };
</script>

</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📦 STOCK SCANNER</h1>
            <div class="stats">
                <span>Total Items: <strong id="totalItems">0</strong></span>
                <span class="critical-count">🔴 Critical: <span id="criticalCount">0</span></span>
                <span class="low-count">🟡 Low: <span id="lowCount">0</span></span>
            </div>
        </div>

        <!-- Search / Scan Section -->
        <div class="scan-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Scan barcode or type material code..." autofocus>
                <button onclick="searchMaterial()">🔍 Search</button>
            </div>
            <div class="mobile-scan-controls">
                <button id="cameraBtn" class="btn-camera" onclick="toggleCamera()">📷 Scan with Camera</button>
                <span class="scan-hint">USB scanner: Just click box and scan</span>
            </div>
            <div id="reader"></div>

        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="btn-add" onclick="showAddForm()">➕ ADD NEW MATERIAL</button>
        </div>

        <!-- Material Found / Selected Section -->
        <div id="selectedMaterial" class="selected-material hidden">
    <button class="close-button" onclick="closeSelectedMaterial()">✕</button>
    <div id="selectedMaterialContent"></div>
</div>

        <!-- Action Forms (hidden by default) -->
        <div id="actionForms" class="action-forms">
            <!-- Add Form -->
            <div id="addForm" class="form-card hidden">
                <h3>➕ Add New Material</h3>
                <input type="text" id="newName" placeholder="Material Name (e.g., 16mm Round Bar)">
                <select id="newCategory">
                    <option value="Steel">Steel</option>
                    <option value="Hardware">Hardware</option>
                    <option value="Consumables">Consumables</option>
                    <option value="Paint">Paint</option>
                </select>
                <input type="text" id="newUnit" placeholder="Unit (e.g., pieces, pairs, kg)" value="pieces">
                <input type="number" id="newStock" placeholder="Initial Stock" value="0">
                <div class="form-actions">
                    <button onclick="saveNewMaterial()" class="btn-save">Save</button>
                    <button onclick="hideAllForms()" class="btn-cancel">Cancel</button>
                </div>
            </div>

            <!-- Receive Form -->
            <div id="receiveForm" class="form-card hidden">
                <h3>📦 Receive Stock</h3>
                <p id="receiveMaterialInfo"></p>
                <input type="number" id="receiveQty" placeholder="Quantity to add" min="1">
                <input type="text" id="receiveNote" placeholder="Notes (e.g., From JSW Steel)">
                <div class="form-actions">
                    <button onclick="saveReceive()" class="btn-save">Add to Stock</button>
                    <button onclick="hideAllForms()" class="btn-cancel">Cancel</button>
                </div>
            </div>

            <!-- Issue Form -->
            <div id="issueForm" class="form-card hidden">
                <h3>🏭 Issue Stock</h3>
                <p id="issueMaterialInfo"></p>
                <input type="number" id="issueQty" placeholder="Quantity to remove" min="1">
                <input type="text" id="issueNote" placeholder="Notes (e.g., To fabrication)">
                <div class="form-actions">
                    <button onclick="saveIssue()" class="btn-save">Remove from Stock</button>
                    <button onclick="hideAllForms()" class="btn-cancel">Cancel</button>
                </div>
            </div>

            <!-- Count Form -->
            <div id="countForm" class="form-card hidden">
                <h3>📊 Physical Count</h3>
                <p id="countMaterialInfo"></p>
                <input type="number" id="countQty" placeholder="Actual physical count">
                <select id="countReason">
                    <option value="Counting error">Counting error</option>
                    <option value="Damaged">Damaged</option>
                    <option value="Lost">Lost/Theft</option>
                    <option value="Other">Other</option>
                </select>
                <div class="form-actions">
                    <button onclick="saveCount()" class="btn-save">Update Stock</button>
                    <button onclick="hideAllForms()" class="btn-cancel">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Materials Table -->
        <div class="materials-section">
            <div class="table-header">
                <h2>Current Stock</h2>
                <div class="table-controls">
                    <select id="categoryFilter" onchange="filterMaterials()">
                        <option value="ALL">All Categories</option>
                        <option value="Steel">Steel</option>
                        <option value="Hardware">Hardware</option>
                        <option value="Consumables">Consumables</option>
                        <option value="Paint">Paint</option>
                    </select>
                    <button onclick="printBarcode()" class="btn-print">🖨️ Print Barcode</button>
                </div>
            </div>
            
            <table id="materialsTable">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Material Name</th>
                        <th>Category</th>
                        <th>Stock</th>
                        <th>Unit</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Filled by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Barcode Print Modal -->
    <div id="barcodeModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeBarcodeModal()">&times;</span>
            <h3>Print Barcode Label</h3>
            <div id="barcodePreview" class="barcode-preview">
                <!-- Barcode image will appear here -->
            </div>
            <div class="barcode-controls">
                <label>Label Size:</label>
                <select id="labelSize">
                    <option value="2x1">2" x 1"</option>
                    <option value="3x1">3" x 1"</option>
                    <option value="4x2">4" x 2"</option>
                </select>
                <label>Copies:</label>
                <input type="number" id="labelCopies" value="2" min="1" max="10">
                <button onclick="printBarcodeLabel()" class="btn-print">Print</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
